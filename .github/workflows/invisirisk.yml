name: JS-test-two

on:
  workflow_dispatch:

permissions:
  checks: write
  actions: read
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build Angular Project and Run PSE

    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@develop
        with:
            api_url: "https://app.dev.invisirisk.com"
      # ============= InvisiRisk Setup End =============
