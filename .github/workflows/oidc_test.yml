name: oidc_test

on:
  workflow_dispatch: 
 
permissions:
  id-token: write
  contents: read
  
jobs:
  test:
    runs-on: ubuntu-latest
    name: Build Angular Project and Run PSE
    
    steps:
       - name: Exchange GitHub OIDC for InvisiRisk API key
         run: |
             OIDC_TOKEN="$(curl -sS \
               -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
               "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=invisirisk-oidc-validator" \
               | jq -r '.value')"
        
             curl -X POST "https://app.dev.invisirisk.com/oidc/exchange" \
               -H "Content-Type: application/json" \
               -d "{
                 \"oidc_token\": \"$OIDC_TOKEN\"
               }"
